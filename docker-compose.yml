version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistica-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistica-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    container_name: logistica-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/logistica
      JWT_SECRET: seu-secret-super-secreto-aqui-change-in-production
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3002:3000"
    volumes:
      - ./backend-nest:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - logistica-network
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: logistica-frontend
    environment:
      - WDS_SOCKET_PORT=3001
      - DOCKER_BACKEND_URL=http://logistica-backend:3000
    ports:
      - "3001:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - logistica-network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  logistica-network:
    driver: bridge