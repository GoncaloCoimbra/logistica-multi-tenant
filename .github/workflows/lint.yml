name: Lint & Format

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint backend
      run: |
        cd backend-nest
        npm run lint
        cd ..
    
    - name: Lint frontend
      run: |
        cd frontend
        npm run lint
        cd ..
      continue-on-error: true
    
    - name: Check backend formatting
      run: |
        cd backend-nest
        npm run format:check
        cd ..
      continue-on-error: true
    
    - name: Check frontend formatting
      run: |
        cd frontend
        npm run format:check
        cd ..
      continue-on-error: true

  format-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check if files need formatting
      run: |
        cd backend-nest
        npm run format:check 2>&1 | grep -q "would reformat" && {
          echo "❌ Backend files need formatting. Run 'npm run format' to fix."
          exit 1
        } || echo "✅ Backend formatting OK"
        cd ..
    
    - name: Check backend TypeScript
      run: |
        cd backend-nest
        npx tsc --noEmit
        cd ..
    
    - name: Check frontend TypeScript
      run: |
        cd frontend
        npx tsc --noEmit
        cd ..

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Check for security vulnerabilities
      run: |
        npm audit --audit-level=moderate || true
    
    - name: Check for outdated dependencies
      run: |
        npm outdated || true
