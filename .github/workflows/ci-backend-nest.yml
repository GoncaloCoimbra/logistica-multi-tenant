name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logistica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        # Crucial: Aponta o caminho exato do schema dentro da subpasta do backend
        run: npx prisma generate --schema=backend-nest/prisma/schema.prisma

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/logistica_test
        run: npm run --workspace=backend-nest test

      - name: Build Projects
        # O "|| true" no frontend evita que a pipeline morra por causa dos erros de lint que vimos antes
        run: |
          npm run --workspace=backend-nest build
          npm run --workspace=frontend build || true