name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (monorepo)
        run: npm install

      - name: Generate Prisma Client      # ← ADICIONAR ISTO
        run: npx prisma generate --schema=backend-nest/prisma/schema.prisma

      - name: Lint all projects
        run: npm run lint-all

      - name: Format check
        run: npm run format-all

  test:
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client      
        run: npx prisma generate --schema=backend-nest/prisma/schema.prisma

      - name: Run all tests with coverage
        run: npm run test-all

  build:
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client      
        run: npx prisma generate --schema=backend-nest/prisma/schema.prisma

      - name: Build all projects
        run: npm run build-all

      - name: Lint Frontend specific
        run: |
          cd frontend
          npm run lint || true

      - name: Run Frontend tests
        run: |
          cd frontend
          npm run test -- --watchAll=false