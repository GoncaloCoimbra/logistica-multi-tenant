name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres15:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logistica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=backend-nest/prisma/schema.prisma
      - name: Lint backend
        run: npm run --workspace=backend-nest lint || true
      - name: Lint frontend
        run: npm run --workspace=frontend lint || true
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/logistica_test
        run: npm run --workspace=backend-nest test
      - name: Run frontend tests
        run: cd frontend && npm run test -- --watchAll=false --passWithNoTests

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=backend-nest/prisma/schema.prisma
      - name: Build backend
        run: npm run --workspace=backend-nest build
      - name: Build frontend
        run: npm run --workspace=frontend build || true
