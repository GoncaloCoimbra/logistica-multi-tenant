name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: logistica_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup backend environment
      run: |
        cd backend-nest
        cp .env.example .env.test
        sed -i 's/DATABASE_URL=.*/DATABASE_URL=postgresql:\/\/test_user:test_password@localhost:5432\/logistica_test/' .env.test
        npm ci
        cd ..
    
    - name: Setup frontend dependencies
      run: |
        cd frontend
        npm ci
        cd ..
    
    - name: Run database migrations
      run: |
        cd backend-nest
        npx prisma migrate deploy --skip-generate
        cd ..
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/logistica_test
    
    - name: Run backend tests
      run: |
        cd backend-nest
        npm run test -- --coverage
        cd ..
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/logistica_test
    
    - name: Run backend E2E tests
      run: |
        cd backend-nest
        npm run test:e2e
        cd ..
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/logistica_test
    
    - name: Run frontend tests
      run: |
        cd frontend
        npm run test -- --coverage --watchAll=false
        cd ..
      env:
        CI: true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./backend-nest/coverage/coverage-final.json,./frontend/coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup backend environment
      run: |
        cd backend-nest
        cp .env.example .env.test
        npm ci
        cd ..
    
    - name: Setup frontend dependencies
      run: |
        cd frontend
        npm ci
        cd ..
    
    - name: Check backend coverage thresholds
      run: |
        cd backend-nest
        npm run test -- --coverage --coverageReporters=json
        node -e "
        const coverage = require('./coverage/coverage-summary.json');
        const global = coverage.total;
        console.log('Backend Coverage:', global);
        if (global.lines.pct < 70) {
          console.error('❌ Backend coverage below 70%');
          process.exit(1);
        }
        console.log('✅ Backend coverage check passed');
        "
        cd ..
      env:
        NODE_ENV: test
    
    - name: Check frontend coverage thresholds
      run: |
        cd frontend
        npm run test -- --coverage --watchAll=false --coverageReporters=json
        node -e "
        const coverage = require('./coverage/coverage-summary.json');
        const global = coverage.total;
        console.log('Frontend Coverage:', global);
        if (global.lines.pct < 70) {
          console.error('❌ Frontend coverage below 70%');
          process.exit(1);
        }
        console.log('✅ Frontend coverage check passed');
        "
        cd ..
      env:
        CI: true
