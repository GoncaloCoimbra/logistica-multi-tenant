name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logistica_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --workspaces

      - name: Run ESLint (Backend)
        run: npm run --workspace=backend-nest lint
        continue-on-error: true

      - name: Run ESLint (Frontend)
        run: npm run --workspace=frontend lint
        continue-on-error: true

      - name: Build Backend
        run: npm run --workspace=backend-nest build

      - name: Build Frontend
        run: npm run --workspace=frontend build

      - name: Run Backend Unit Tests
        run: npm run --workspace=backend-nest test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/logistica_test
        continue-on-error: true

      - name: Run Backend E2E Tests
        run: npm run --workspace=backend-nest test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/logistica_test
        continue-on-error: true

      - name: Run Frontend Tests
        run: npm run --workspace=frontend test
        continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm install --workspaces

      - name: Check for TypeScript errors
        run: npm run --workspace=backend-nest build:check
        continue-on-error: true

      - name: Check security vulnerabilities
        run: npm audit
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-nest
          file: ./backend-nest/Dockerfile
          push: false
          tags: logistica-api:latest

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: logistica-frontend:latest

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          npm install --workspaces
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
